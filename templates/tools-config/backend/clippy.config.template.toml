# Clippy 配置模板
# 使用方法：
#   选项1: 复制到项目根目录并重命名为 clippy.toml
#   选项2: 将内容添加到 Cargo.toml 的 [lints.clippy] 部分

# 零警告策略
warn = "all"
deny = ["warnings"]

# 复杂度限制
cognitive-complexity-threshold = 15
too_many_lines_threshold = 400

# 其他常用配置
allow-expect-in-tests = true
unwrap-used = "deny"
expect-used = "deny"
